<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>SSDownloader</title>
<link rel="icon" type="image/png" href="logo.png">

<style>
  /* Page setup */
  html, body {
    height: 100%;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(120deg, #1877f2, #4facfe);
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
  }

  /* Container for all content */
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Logo style */
  .logo {
    width: 200px;
    height: auto;
    margin-bottom: 20px;
  }

  /* Heading */
  h1 {
    margin: 0;
    font-size: 48px;
  }

  /* Tagline */
  p {
    margin: 10px 0 30px 0;
    font-size: 20px;
    max-width: 500px;
  }

  /* Download button */
  .download-btn {
    background-color: white;
    color: #1877f2;
    border: none;
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    text-decoration: none;
  }

  .download-btn:hover {
    background-color: #f0f0f0;
  }

  /* Mobile responsive */
  @media(max-width:600px){
    h1{font-size:32px;}
    p{font-size:16px;}
    .logo{width:150px;}
  }
</style>
</head>

<body>
  <div class="container">
    <img src="logo.png" alt="SSDownloader Logo" class="logo">
    <h1>SSDownloader</h1>
    <p>Download videos and music easily for learning and personal use.</p>
    <a href="#" class="download-btn">Start Downloading</a>
  </div>
</body>
</html>
